<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpotFinder — Direct Ordering</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Barlow:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root { --bg: #F5F2EC; --ink: #0D0D0D; --accent: #E8390E; --line: rgba(13,13,13,0.12); --font-display: 'Syne', sans-serif; --font-body: 'Barlow', sans-serif; }
    body { background: var(--bg); color: var(--ink); font-family: var(--font-body); margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
    .page { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
    h1 { font-family: var(--font-display); font-size: 38px; letter-spacing: -0.04em; margin-bottom: 5px; }
    .search-card { background: #FAFAF7; border: 1.5px solid var(--line); border-radius: 12px; padding: 20px; margin-bottom: 30px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
    input { width: 100%; padding: 12px; border: 1.5px solid var(--line); border-radius: 6px; font-size: 16px; box-sizing: border-box; background: #fff; border: 1.5px solid var(--line); }
    .chips { display: flex; flex-wrap: wrap; gap: 6px; margin: 15px 0; }
    .chip { padding: 6px 12px; border-radius: 20px; border: 1px solid var(--line); cursor: pointer; font-size: 12px; font-weight: 600; background: #fff; color: var(--ink); }
    .chip.on { background: var(--ink); color: #fff; border-color: var(--ink); }
    .search-btn { width: 100%; padding: 16px; background: var(--ink); color: #fff; border: none; border-radius: 6px; font-family: var(--font-display); font-weight: 800; cursor: pointer; text-transform: uppercase; }
    .search-btn:disabled { opacity: 0.3; }
    .status { text-align: center; padding: 20px; font-weight: 600; display: none; color: var(--accent); }
    .restaurant-card { background: #fff; border: 1.5px solid var(--line); padding: 20px; border-radius: 8px; margin-bottom: 12px; }
    .rc-name { font-family: var(--font-display); font-size: 18px; margin-bottom: 4px; }
    .rc-link { display: inline-block; margin-top: 10px; padding: 10px 20px; background: var(--accent); color: #fff; text-decoration: none; border-radius: 4px; font-size: 12px; font-weight: 700; }
    .empty { text-align: center; padding: 40px; opacity: 0.6; font-weight: 600; }
  </style>
</head>
<body>
  <div class="page">
    <h1>SpotFinder<span>.</span></h1>
    <p style="opacity:0.7; margin-bottom:25px;">Finding direct ordering links for your city...</p>

    <div class="search-card">
      <div class="grid">
        <input type="text" id="city" placeholder="City (e.g. Chicago)">
        <input type="text" id="state" placeholder="State (e.g. IL)">
      </div>
      <div class="chips" id="chips"></div>
      <button class="search-btn" id="btn" disabled>Find Restaurants</button>
    </div>

    <div id="status" class="status">Searching the web...</div>
    <div id="results"></div>
  </div>

  <script>
    const PLATFORMS = ["Toast", "Clover", "Menufy", "SpotOn", "Thanx", "SmileDining", "TapMango", "Olo", "BentoBox"];
    let selected = new Set(["Toast", "SpotOn", "Clover", "Menufy"]);
    const chipsCont = document.getElementById('chips');
    const btn = document.getElementById('btn');

    PLATFORMS.forEach(p => {
      const el = document.createElement('div');
      el.className = `chip ${selected.has(p) ? 'on' : ''}`;
      el.textContent = p;
      el.onclick = () => {
        selected.has(p) ? selected.delete(p) : selected.add(p);
        el.classList.toggle('on');
        btn.disabled = selected.size === 0;
      };
      chipsCont.appendChild(el);
    });

    document.querySelectorAll('input').forEach(i => i.oninput = () => {
      btn.disabled = !document.getElementById('city').value || !document.getElementById('state').value || selected.size === 0;
    });

    btn.onclick = async () => {
      const city = document.getElementById('city').value;
      const state = document.getElementById('state').value;
      const resultsDiv = document.getElementById('results');
      const status = document.getElementById('status');
      
      btn.disabled = true;
      status.style.display = 'block';
      resultsDiv.innerHTML = '';

      try {
        const res = await fetch('/api/search', {
          method: 'POST',
          body: JSON.stringify({ city, state, platforms: Array.from(selected) })
        });
        
        let text = await res.text();
        
        // --- IMPROVED CLEANER ---
        let cleaned = text.replace(/```json/g, "").replace(/```/g, "").trim();
        const start = Math.min(
            cleaned.indexOf('{') === -1 ? Infinity : cleaned.indexOf('{'),
            cleaned.indexOf('[') === -1 ? Infinity : cleaned.indexOf('[')
        );
        const end = Math.max(cleaned.lastIndexOf('}'), cleaned.lastIndexOf(']'));

        // If the AI didn't return a JSON block, show "No results" instead of an error
        if (start === Infinity || end === -1) {
          resultsDiv.innerHTML = `<div class="empty">No direct links found for ${city}.<br>Try adding more platforms like Toast or Menufy!</div>`;
          return;
        }

        const data = JSON.parse(cleaned.substring(start, end + 1));
        const resultsArray = data.results ? data.results : (Array.isArray(data) ? data : []);

        if (resultsArray.length === 0) {
          resultsDiv.innerHTML = `<div class="empty">No results found in ${city}.</div>`;
        } else {
          resultsArray.forEach(group => {
            if (!group.restaurants) return;
            group.restaurants.forEach(r => {
              resultsDiv.innerHTML += `
                <div class="restaurant-card">
                  <div style="font-size:10px; font-weight:800; color:var(--accent); text-transform:uppercase;">${group.platform}</div>
                  <div class="rc-name">${r.name}</div>
                  <div style="font-size:13px; opacity:0.7;">${r.cuisine || 'Restaurant'} • ${r.address || city}</div>
                  <a href="${r.orderUrl}" target="_blank" class="rc-link">Order Direct ↗</a>
                </div>`;
            });
          });
        }
      } catch (e) {
        resultsDiv.innerHTML = `<div class="empty">The AI got confused. Try one more time!</div>`;
      } finally {
        status.style.display = 'none';
        btn.disabled = false;
      }
    };
  </script>
</body>
</html>
