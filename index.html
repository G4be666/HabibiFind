<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpotFinder — Discover Hidden Restaurant Ordering Pages</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Barlow:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #F5F2EC; --ink: #0D0D0D; --accent: #E8390E; --line: rgba(13,13,13,0.12);
      --font-display: 'Syne', sans-serif; --font-body: 'Barlow', sans-serif;
    }
    body { background: var(--bg); color: var(--ink); font-family: var(--font-body); margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
    .page { max-width: 900px; margin: 0 auto; padding: 60px 20px; }
    h1 { font-family: var(--font-display); font-size: clamp(32px, 5vw, 54px); letter-spacing: -0.04em; line-height: 1; margin-bottom: 20px; }
    .search-card { background: #FAFAF7; border: 1.5px solid var(--line); border-radius: 12px; padding: 30px; margin-bottom: 30px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
    input { width: 100%; padding: 12px; border: 1.5px solid var(--line); border-radius: 6px; font-size: 16px; outline: none; background: var(--bg); }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; margin: 20px 0; }
    .chip { padding: 8px 16px; border-radius: 20px; border: 1.5px solid var(--line); cursor: pointer; font-size: 13px; font-weight: 600; transition: 0.2s; }
    .chip.on { background: var(--ink); color: white; border-color: var(--ink); }
    .search-btn { width: 100%; padding: 16px; background: var(--ink); color: white; border: none; border-radius: 6px; font-family: var(--font-display); font-weight: 800; text-transform: uppercase; cursor: pointer; }
    .search-btn:disabled { opacity: 0.4; }
    .status { padding: 20px; text-align: center; font-weight: 600; display: none; }
    .restaurant-card { background: #FAFAF7; border: 1.5px solid var(--line); padding: 20px; border-radius: 8px; margin-bottom: 12px; }
    .rc-name { font-family: var(--font-display); font-size: 18px; margin-bottom: 5px; }
    .rc-link { display: inline-block; margin-top: 10px; padding: 8px 15px; background: var(--accent); color: white; text-decoration: none; border-radius: 4px; font-size: 12px; font-weight: 700; }
  </style>
</head>
<body>
  <div class="page">
    <h1>SpotFinder<span>.</span></h1>
    <p style="margin-bottom:40px; opacity:0.8;">Find restaurants using private ordering platforms instead of DoorDash.</p>

    <div class="search-card">
      <div class="grid">
        <input type="text" id="city" placeholder="City (e.g. Portland)">
        <input type="text" id="state" placeholder="State (e.g. Oregon)">
      </div>
      <div class="chips" id="chips"></div>
      <button class="search-btn" id="btn" disabled>Find Restaurants</button>
    </div>

    <div id="status" class="status">Searching the web...</div>
    <div id="results"></div>
  </div>

  <script>
    const PLATFORMS = [
      "Toast", "Clover", "Menufy", "SpotOn", "Thanx", "SmileDining", "TapMango", "Olo", "BentoBox"
    ];
    let selected = new Set(["Toast", "SpotOn", "Clover"]);
    const chipsCont = document.getElementById('chips');
    const btn = document.getElementById('btn');

    PLATFORMS.forEach(p => {
      const el = document.createElement('div');
      el.className = `chip ${selected.has(p) ? 'on' : ''}`;
      el.textContent = p;
      el.onclick = () => {
        selected.has(p) ? selected.delete(p) : selected.add(p);
        el.classList.toggle('on');
        btn.disabled = selected.size === 0;
      };
      chipsCont.appendChild(el);
    });

    document.querySelectorAll('input').forEach(i => i.oninput = () => {
      btn.disabled = !document.getElementById('city').value || !document.getElementById('state').value || selected.size === 0;
    });

    btn.onclick = async () => {
      const city = document.getElementById('city').value;
      const state = document.getElementById('state').value;
      const resultsDiv = document.getElementById('results');
      const status = document.getElementById('status');
      
      btn.disabled = true;
      status.style.display = 'block';
      resultsDiv.innerHTML = '';

      try {
        const res = await fetch('/api/search', {
          method: 'POST',
          body: JSON.stringify({ city, state, platforms: Array.from(selected) })
        });
        
        const text = await res.text();
        
        // THE FIX: "JSON HUNTER"
        // This looks for the first '{' and the last '}' to ignore any AI chatter
        const start = text.indexOf('{');
        const end = text.lastIndexOf('}');
        
        if (start === -1) throw new Error("No data found for this area.");
        const data = JSON.parse(text.substring(start, end + 1));

        if (!data.results || data.results.length === 0) {
          resultsDiv.innerHTML = "<p style='text-align:center;'>No restaurants found for these specific platforms here.</p>";
        } else {
          data.results.forEach(group => {
            group.restaurants.forEach(r => {
              resultsDiv.innerHTML += `
                <div class="restaurant-card">
                  <div style="font-size:10px; font-weight:800; color:var(--accent); text-transform:uppercase; margin-bottom:5px;">${group.platform}</div>
                  <div class="rc-name">${r.name}</div>
                  <div style="font-size:13px; opacity:0.7;">${r.cuisine || 'Restaurant'} • ${r.address || city}</div>
                  <a href="${r.orderUrl}" target="_blank" class="rc-order-btn rc-link">Order Direct ↗</a>
                </div>`;
            });
          });
        }
      } catch (e) {
        resultsDiv.innerHTML = `<div style="color:red; text-align:center; padding:20px;">${e.message}</div>`;
      } finally {
        status.style.display = 'none';
        btn.disabled = false;
      }
    };
  </script>
</body>
</html>
