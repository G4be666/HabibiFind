<!DOCTYPE html>
<html>
<head>
    <title>Free Restaurant Aggregator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: system-ui, sans-serif; max-width: 1000px; margin: 2rem auto; padding: 1rem; }
        input, button { padding: 10px; font-size: 1rem; margin: 5px; }
        .restaurant { border: 1px solid #ddd; border-radius: 12px; padding: 1rem; margin: 1rem 0; }
        .platform { background: #eef; display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; }
        a { color: #0066cc; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .loading { color: #666; font-style: italic; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>🍽️ Find Restaurants by Ordering Platform</h1>
    <p>Enter a city & state or zip code → get direct links to order using Clover, Menufy, OrderSpotOn, Thanx, SmileDining, or TapMango.</p>
    
    <div>
        <input type="text" id="location" placeholder="e.g., Chicago, IL or 90210" size="30">
        <button id="searchBtn">🔍 Search</button>
    </div>
    
    <div id="results"></div>

    <script>
        const searchBtn = document.getElementById('searchBtn');
        const locationInput = document.getElementById('location');
        const resultsDiv = document.getElementById('results');
        
        searchBtn.addEventListener('click', async () => {
            const location = locationInput.value.trim();
            if (!location) {
                resultsDiv.innerHTML = '<p class="error">Please enter a location.</p>';
                return;
            }
            
            resultsDiv.innerHTML = '<div class="loading">Searching... this takes ~5 seconds while we check all 6 platforms.</div>';
            
            try {
                const response = await fetch('/.netlify/functions/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ location })
                });
                
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                
                if (data.restaurants.length === 0) {
                    resultsDiv.innerHTML = `<p>No restaurants found for "${location}" using those platforms. Try a different city or zip code.</p>`;
                    return;
                }
                
                // Group by platform for nicer display
                const byPlatform = {};
                for (const r of data.restaurants) {
                    if (!byPlatform[r.platform]) byPlatform[r.platform] = [];
                    byPlatform[r.platform].push(r);
                }
                
                let html = `<h3>Found ${data.count} restaurants in ${data.location}</h3>`;
                for (const [platform, restaurants] of Object.entries(byPlatform)) {
                    html += `<details><summary><strong>${platform}</strong> (${restaurants.length})</summary>`;
                    for (const r of restaurants) {
                        html += `
                            <div class="restaurant">
                                <b>${escapeHtml(r.name)}</b><br>
                                <span class="platform">${escapeHtml(r.platform)}</span><br>
                                <a href="${escapeHtml(r.url)}" target="_blank">🔗 Order directly →</a>
                                <p style="font-size:0.8rem; color:#555;">${escapeHtml(r.snippet?.substring(0, 150) || '')}</p>
                            </div>
                        `;
                    }
                    html += `</details><br>`;
                }
                resultsDiv.innerHTML = html;
            } catch (err) {
                resultsDiv.innerHTML = `<p class="error">Error: ${err.message}. Check console for details.</p>`;
                console.error(err);
            }
        });
        
        function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
    </script>
</body>
</html>
