<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpotFinder — Direct Ordering Search</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Barlow:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    :root { --bg: #F5F2EC; --ink: #0D0D0D; --accent: #E8390E; --line: rgba(13,13,13,0.12); --font-display: 'Syne', sans-serif; --font-body: 'Barlow', sans-serif; }
    body { background: var(--bg); color: var(--ink); font-family: var(--font-body); margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
    .page { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
    h1 { font-family: var(--font-display); font-size: 42px; letter-spacing: -0.04em; margin-bottom: 10px; }
    .search-card { background: #FAFAF7; border: 1.5px solid var(--line); border-radius: 12px; padding: 25px; margin-bottom: 30px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
    input { width: 100%; padding: 12px; border: 1.5px solid var(--line); border-radius: 6px; font-size: 16px; box-sizing: border-box; }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; margin: 15px 0; }
    .chip { padding: 6px 14px; border-radius: 20px; border: 1.5px solid var(--line); cursor: pointer; font-size: 12px; font-weight: 600; opacity: 0.5; }
    .chip.on { background: var(--ink); color: white; border-color: var(--ink); opacity: 1; }
    .search-btn { width: 100%; padding: 16px; background: var(--ink); color: white; border: none; border-radius: 6px; font-family: var(--font-display); font-weight: 800; cursor: pointer; text-transform: uppercase; }
    .search-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .status { text-align: center; padding: 20px; font-weight: 600; display: none; }
    .restaurant-card { background: #FAFAF7; border: 1.5px solid var(--line); padding: 20px; border-radius: 8px; margin-bottom: 10px; }
    .rc-name { font-family: var(--font-display); font-size: 18px; margin-bottom: 4px; }
    .rc-link { display: inline-block; margin-top: 10px; padding: 8px 15px; background: var(--accent); color: white; text-decoration: none; border-radius: 4px; font-size: 11px; font-weight: 700; }
    #debug-log { display: none; background: #fee; color: #911; padding: 15px; border-radius: 6px; font-family: monospace; font-size: 12px; margin-top: 20px; white-space: pre-wrap; word-break: break-all; }
  </style>
</head>
<body>
  <div class="page">
    <h1>SpotFinder<span>.</span></h1>
    <p style="opacity:0.7; margin-bottom:30px;">Direct ordering links for local restaurants.</p>

    <div class="search-card">
      <div class="grid">
        <input type="text" id="city" placeholder="City">
        <input type="text" id="state" placeholder="State">
      </div>
      <div class="chips" id="chips"></div>
      <button class="search-btn" id="btn" disabled>Search Platforms</button>
    </div>

    <div id="status" class="status">Searching... (Can take 15-20 seconds)</div>
    <div id="results"></div>
    <div id="debug-log"></div>
  </div>

  <script>
    const PLATFORMS = ["Toast", "Clover", "Menufy", "SpotOn", "Thanx", "SmileDining", "TapMango", "Olo", "BentoBox"];
    let selected = new Set(["Toast", "SpotOn", "Clover", "Menufy"]);
    const chipsCont = document.getElementById('chips');
    const btn = document.getElementById('btn');
    const debug = document.getElementById('debug-log');

    PLATFORMS.forEach(p => {
      const el = document.createElement('div');
      el.className = `chip ${selected.has(p) ? 'on' : ''}`;
      el.textContent = p;
      el.onclick = () => {
        selected.has(p) ? selected.delete(p) : selected.add(p);
        el.classList.toggle('on');
        btn.disabled = selected.size === 0;
      };
      chipsCont.appendChild(el);
    });

    document.querySelectorAll('input').forEach(i => i.oninput = () => {
      btn.disabled = !document.getElementById('city').value || !document.getElementById('state').value || selected.size === 0;
    });

    btn.onclick = async () => {
      const city = document.getElementById('city').value;
      const state = document.getElementById('state').value;
      const resultsDiv = document.getElementById('results');
      const status = document.getElementById('status');
      
      btn.disabled = true;
      status.style.display = 'block';
      resultsDiv.innerHTML = '';
      debug.style.display = 'none';

      try {
        const res = await fetch('/api/search', {
          method: 'POST',
          body: JSON.stringify({ city, state, platforms: Array.from(selected) })
        });
        
        let text = await res.text();

        // DEEP CLEANER: Handles blocks, lists, and strings
        const cleaned = text.replace(/```json/g, "").replace(/```/g, "").trim();
        const start = Math.min(
            cleaned.indexOf('{') === -1 ? Infinity : cleaned.indexOf('{'),
            cleaned.indexOf('[') === -1 ? Infinity : cleaned.indexOf('[')
        );
        const end = Math.max(cleaned.lastIndexOf('}'), cleaned.lastIndexOf(']'));
        
        if (start === Infinity || end === -1) {
            debug.textContent = "AI Raw Response: \n" + text;
            debug.style.display = 'block';
            throw new Error("Invalid format. See debug log below.");
        }
        
        const data = JSON.parse(cleaned.substring(start, end + 1));
        
        // Normalize results (handles if data is a list or an object)
        const finalResults = data.results || (Array.isArray(data) ? data : []);

        if (finalResults.length === 0) {
          resultsDiv.innerHTML = "<p style='text-align:center;'>No direct links found in this area.</p>";
        } else {
          finalResults.forEach(group => {
            if (!group.restaurants) return;
            group.restaurants.forEach(r => {
              resultsDiv.innerHTML += `
                <div class="restaurant-card">
                  <div style="font-size:9px; font-weight:800; color:var(--accent); text-transform:uppercase;">${group.platform}</div>
                  <div class="rc-name">${r.name}</div>
                  <div style="font-size:13px; opacity:0.7;">${r.cuisine || 'Restaurant'} • ${r.address || city}</div>
                  <a href="${r.orderUrl}" target="_blank" class="rc-link">Order Direct ↗</a>
                </div>`;
            });
          });
        }
      } catch (e) {
        resultsDiv.innerHTML = `<div style="color:red; text-align:center; padding:20px;">Error: ${e.message}</div>`;
      } finally {
        status.style.display = 'none';
        btn.disabled = false;
      }
    };
  </script>
</body>
</html>
